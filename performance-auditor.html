            position: relative;
            overflow: hidden;

            box-shadow:
                0 0 10px rgba(0, 245, 255, 0.4),
                0 0 20px rgba(79, 172, 254, 0.3),
                0 0 30px rgba(142, 45, 226, 0.2);

            transition: all 0.3s ease;
        }
        #audit-btn::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: inherit;

        background: linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.4),
            transparent
        );

        opacity: 0;
        transition: opacity 0.4s ease;
        }

        #audit-btn:hover::before {
        opacity: 1;
        animation: shine 1s linear;
        }


        #audit-btn:hover {
        transform: translateY(-3px) scale(1.02);

        box-shadow:
            0 0 20px rgba(0, 245, 255, 0.7),
            0 0 40px rgba(79, 172, 254, 0.5),
            0 0 60px rgba(142, 45, 226, 0.4);
        }

        @keyframes shine {
        from { transform: translateX(-100%); }
        to { transform: translateX(100%); }
        }


        /* Scanner Styling */
        #scanner-container {
            position: relative;
            height: 200px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        #scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            box-shadow: 0 0 15px var(--accent-color);

        #status-text {
            color: var(--accent-color);

<body>
    <div id="vanta-canvas"></div>
    <div class="container">

    <script>
        /**
         * EMMY STACK01 - Website Performance Auditor
         * Logic: 
         * 1. startAudit triggers the GSAP UI and calls the Vercel API.
         * 2. handleResults processes the data and triggers the staggered reveal.
         */
        VANTA.DOTS({
        el: "#vanta-canvas", // Replace with your actual div ID
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        /* Custom Color Configuration */
        backgroundColor: 0x000000, // Black background
        color: 0x2d66b4,           // Primary dot color
        color2: 0x00ccff,          // Secondary dot color
        size: 3.00,                // Matches the 'size' slider in your screenshot
        spacing: 35.00,            // Matches the 'spacing' slider in your screenshot
        showLines: false           // Keeps the focus on the dots
        })

        // 1. UI: The Scanning Animation
        function toggleScanner(show) {
            const scanner = document.getElementById('scanner-container');
            if (show) {
                scanner.style.display = 'block';
                gsap.to("#scan-line", {
                    top: "100%",
                    duration: 1.5,
                    repeat: -1,
                    yoyo: true,
                    ease: "power1.inOut"
                });
            } else {
                // Fade out scanner and hide it
                gsap.to(scanner, { opacity: 0, duration: 0.5, onComplete: () => {
                    scanner.style.display = 'none';
                    scanner.style.opacity = 1; // Reset opacity for next use
                }});
            }
        }

        // 2. UI: Status Text Messenger
        let statusInterval;
        function startStatusUpdates() {
            const messages = [
                "FETCHING DOM STRUCTURE...",
                "ANALYZING ASSET COMPRESSION...",
                "CHECKING RENDER-BLOCKING RESOURCES...",
                "DECODING DIGITAL DNA...",
                "COMPILING PERFORMANCE REPORT..."
            ];
            let i = 0;
            const textElement = document.getElementById('status-text');
            
            statusInterval = setInterval(() => {
                if (i < messages.length) {
                    textElement.innerText = messages[i];
                    i++;
                }
            }, 1500);
        }

        // 3. MAIN: The Audit Controller
        async function startAudit() {
            const targetUrl = document.getElementById('url-input').value;
            if (!targetUrl) return alert("Please enter a URL first.");

            // Start visual vibe
            toggleScanner(true);
            startStatusUpdates();

            try {
                // Call your Vercel Serverless Function
                const response = await fetch(`/api/audit?url=${encodeURIComponent(targetUrl)}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                // Success: Clean up scanner and show results
                clearInterval(statusInterval);
                toggleScanner(false);
                
                // Wait for scanner fade-out before revealing results
                setTimeout(() => {
                    renderScores(data.scores);
                    renderAudits(data.audits);
                }, 600);

            } catch (err) {
                clearInterval(statusInterval);
                toggleScanner(false);
                alert("Audit Failed: " + err.message);
                console.error("Audit error:", err);
            }
        }

        // 4. UI: Render Score Cards
        function renderScores(scores) {
            const getStatus = (s) => s >= 90 ? 'score-high' : (s >= 50 ? 'score-med' : 'score-low');

            const metrics = [
                { id: 'perf-score', val: scores.performance },
                { id: 'seo-score', val: scores.seo },
                { id: 'ux-score', val: scores.accessibility }
            ];

            metrics.forEach(m => {
                const el = document.getElementById(m.id);
                el.innerText = Math.round(m.val);
                el.className = `score-number ${getStatus(m.val)}`;
            });

            // GSAP Reveal Cards
            gsap.fromTo(".score-card", 
                { opacity: 0, y: 30 }, 
                { opacity: 1, y: 0, duration: 0.8, stagger: 0.2, ease: "back.out(1.7)" }
            );
        }

        // 5. UI: Render Issue List
        function renderAudits(audits) {
            const listContainer = document.getElementById('issues-list');
            listContainer.innerHTML = ''; 

            const diagnosticMap = {
                'render-blocking-resources': {
                    title: "Render-Blocking Code",
                    pain: "Your site waits for heavy files before showing anything.",
                    fix: "Refactor to ES6+ Modules."
                },
                'modern-image-formats': {
                    title: "Outdated Image Formats",
                    pain: "Large images are draining user data.",
                    fix: "Convert to WebP/Avif."
                },
                'cumulative-layout-shift': {
                    title: "Visual Instability",
                    pain: "Elements jump around while loading.",
                    fix: "Stabilize with GSAP & CSS ratios."
                }
            };

            let failCount = 0;
            Object.keys(diagnosticMap).forEach(key => {
                if (audits[key] && audits[key].score < 0.9) {
                    failCount++;
                    const issue = diagnosticMap[key];
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div style="border-left: 4px solid #ff4444; padding-left: 15px; margin-bottom: 20px;">
                            <h4 style="color: #ff4444; margin: 0;">${issue.title}</h4>
                            <p style="color: #ccc; margin: 5px 0;">${issue.pain}</p>
                            <small style="color: #00ff88;"><strong>FIX:</strong> ${issue.fix}</small>
                        </div>
                    `;
                    listContainer.appendChild(li);
                }
            });

            showCTA(failCount);
        }

        // 6. UI: Call to Action
        function showCTA(count) {
            const cta = document.getElementById('cta-area');
            if (count > 0) {
                cta.innerHTML = `
                    <div class="cta-box" style="background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; padding: 25px; border-radius: 12px; text-align: center;">
                        <h2 style="color: #fff;">Found ${count} critical leaks.</h2>
                        <button class="fix-btn" onclick="window.location.href='#contact'">Fix My Digital DNA</button>
                    </div>`;
            } else {
                cta.innerHTML = `<div class="cta-box"><h2>Your DNA is clean!</h2></div>`;
            }
        }
    </script>
