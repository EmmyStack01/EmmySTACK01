<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naira-Wise Ultimate | Emmy STACK01</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --accent: #111827;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* --- Input Side (Control Panel) --- */
        .controls {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border-top: 6px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }

        h2 { margin-top: 0; color: var(--accent); font-weight: 800; }
        .branding-p { font-size: 0.85rem; color: var(--text-light); margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 5px; }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fdfdfd;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Item Table in Builder */
        .items-header { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 10px; margin-top: 20px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 10px; margin-bottom: 10px; }
        
        .btn-add { background: #eef2ff; color: var(--primary); border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-remove { background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer; }
        
        .vat-box { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 25px; }
        .checkbox-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .checkbox-wrap input { width: auto; }

        .btn-download {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        /* --- Preview Side (Invoice) --- */
        .preview-area { position: sticky; top: 20px; overflow-x: auto; }
        
        .invoice-paper {
            background: white;
            width: 794px; /* A4 width */
            min-height: 1123px; /* A4 height */
            padding: 60px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .inv-header { display: flex; justify-content: space-between; margin-bottom: 50px; }
        #logoPreview { max-height: 70px; margin-bottom: 15px; display: block; }
        .biz-title { font-size: 1.8rem; font-weight: 900; color: var(--primary-dark); margin: 0; }
        .biz-addr { font-size: 0.8rem; color: var(--text-light); white-space: pre-line; max-width: 300px; }
        
        .inv-type { text-align: right; }
        .inv-type h1 { font-size: 4rem; margin: 0; opacity: 0.05; letter-spacing: 5px; }
        .meta-text { font-size: 0.75rem; font-weight: 700; color: var(--text-light); margin: 5px 0; }
        .meta-text span { color: var(--accent); }

        .bill-to { margin-bottom: 40px; }
        .bill-to label { color: var(--primary); letter-spacing: 1px; }
        .bill-to h3 { font-size: 1.5rem; margin: 5px 0; color: var(--accent); }

        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .invoice-table th { text-align: left; border-bottom: 2px solid #f1f5f9; padding: 12px 5px; font-size: 10px; text-transform: uppercase; color: var(--text-light); }
        .invoice-table td { padding: 15px 5px; border-bottom: 1px solid #f8fafc; font-size: 0.9rem; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .total-section { display: flex; justify-content: flex-end; margin-top: 30px; }
        .total-card { background: #f8fafc; padding: 25px; border-radius: 12px; width: 280px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-light); }
        .grand-total { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 1.4rem; font-weight: 900; color: var(--primary-dark); }

        .inv-footer { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--accent); color: white; padding: 12px 30px; display: flex; justify-content: space-between; font-size: 9px; letter-spacing: 1px; }
        .inv-footer a { color: #818cf8; text-decoration: none; }

        /* --- Responsive Styles --- */
        @media (max-width: 1100px) {
            .app-container { grid-template-columns: 1fr; }
            .preview-area { position: static; }
        }

        @media (max-width: 600px) {
            .items-header { display: none; }
            .item-row { grid-template-columns: 1fr; gap: 5px; background: #f8fafc; padding: 10px; border-radius: 8px; }
            .btn-remove { justify-self: end; }
            .invoice-paper { width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="controls">
        <h2>Naira-Wise Pro+</h2>
        <p class="branding-p">Smart Invoicing by Emmy STACK01</p>

        <div class="form-group">
            <label>Business Logo</label>
            <input type="file" id="logoUpload" accept="image/*">
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Currency</label>
                <select id="currency">
                    <option value="₦">NGN (₦)</option>
                    <option value="$">USD ($)</option>
                </select>
            </div>
            <div>
                <label>Business Name</label>
                <input type="text" id="bizName" placeholder="e.g. Emmy STACK01">
            </div>
        </div>

        <div class="form-group">
            <label>Business Address</label>
            <textarea id="bizAddress" placeholder="Address, Email, Phone..."></textarea>
        </div>

        <div class="form-group">
            <label>Client Name</label>
            <input type="text" id="clientName" placeholder="Who is paying?">
        </div>

        <div class="items-header">
            <label>Description</label>
            <label class="text-center">Qty</label>
            <label class="text-right">Price</label>
            <span></span>
        </div>
        <div id="itemsList"></div>
        <button class="btn-add" onclick="addItem()">+ Add Item</button>

        <div class="vat-box">
            <label class="checkbox-wrap">
                <input type="checkbox" id="vatToggle">
                <span>Add 7.5% VAT</span>
            </label>
            <label>Bank Details</label>
            <input type="text" id="bankInfo" placeholder="Bank Name - Account #">
        </div>

        <button class="btn-download" onclick="downloadPDF()">Export PDF</button>
    </div>

    <div class="preview-area">
        <div id="invoice-capture" class="invoice-paper">
            
            <div class="inv-header">
                <div>
                    <img id="logoPreview" style="display:none;">
                    <h2 id="prevBizName" class="biz-title">YOUR BUSINESS</h2>
                    <p id="prevBizAddr" class="biz-addr"></p>
                </div>
                <div class="inv-type">
                    <h1>RECEIPT</h1>
                    <p class="meta-text">NO: <span id="prevNo">#0000</span></p>
                    <p class="meta-text">DATE: <span id="prevDate">-- -- --</span></p>
                </div>
            </div>

            <div class="bill-to">
                <label>BILL TO</label>
                <h3 id="prevClientName">Client Name</h3>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th class="text-center">Qty</th>
                        <th class="text-right">Price</th>
                        <th class="text-right">Total</th>
                    </tr>
                </thead>
                <tbody id="prevTableBody"></tbody>
            </table>

            <div class="total-section">
                <div class="total-card">
                    <div class="total-row">
                        <span>Subtotal</span>
                        <span><span class="curr">₦</span><span id="prevSubtotal">0</span></span>
                    </div>
                    <div class="total-row">
                        <span>VAT (7.5%)</span>
                        <span><span class="curr">₦</span><span id="prevVat">0</span></span>
                    </div>
                    <div class="grand-total">
                        <span>Total</span>
                        <span><span class="curr">₦</span><span id="prevTotal">0</span></span>
                    </div>
                </div>
            </div>

            <div style="margin-top: 50px;">
                <label style="color:var(--primary); font-size: 10px; font-weight: 800;">PAYMENT METHOD</label>
                <p id="prevBank" style="margin: 5px 0; font-weight: 600;"></p>
            </div>

            <div class="inv-footer">
                <span>POWERED BY EMMY STACK01</span>
                <span>AUTOMATE YOUR FLOW: <a href="https://emmystack01.com">EMMYSTACK01.COM</a></span>
            </div>
        </div>
    </div>
</div>

<script>
    let items = [{ id: Date.now(), desc: 'Web Development', qty: 1, price: 0 }];

    function init() {
        document.getElementById('prevNo').innerText = '#' + Math.floor(Math.random() * 90000 + 10000);
        document.getElementById('prevDate').innerText = new Date().toLocaleDateString('en-GB');
        
        // Add listeners to all static inputs
        ['bizName', 'bizAddress', 'clientName', 'bankInfo', 'currency', 'vatToggle'].forEach(id => {
            document.getElementById(id).addEventListener('input', update);
        });

        renderItems();
        update();
    }

    function addItem() {
        items.push({ id: Date.now(), desc: '', qty: 1, price: 0 });
        renderItems();
        update();
    }

    function removeItem(id) {
        if(items.length > 1) {
            items = items.filter(i => i.id !== id);
            renderItems();
            update();
        }
    }

    function updateItemData(id, field, value) {
        const item = items.find(i => i.id === id);
        if (field === 'desc') item[field] = value;
        else item[field] = parseFloat(value) || 0;
        update();
    }

    function renderItems() {
        const container = document.getElementById('itemsList');
        container.innerHTML = '';
        items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="text" placeholder="Item..." value="${item.desc}" oninput="updateItemData(${item.id}, 'desc', this.value)">
                <input type="number" placeholder="1" value="${item.qty}" class="text-center" oninput="updateItemData(${item.id}, 'qty', this.value)">
                <input type="number" placeholder="0" class="text-right" oninput="updateItemData(${item.id}, 'price', this.value)">
                <button class="btn-remove" onclick="removeItem(${item.id})">&times;</button>
            `;
            container.appendChild(row);
        });
    }

    function update() {
        let subtotal = 0;
        const previewTable = document.getElementById('prevTableBody');
        previewTable.innerHTML = '';

        items.forEach(item => {
            const rowTotal = item.qty * item.price;
            subtotal += rowTotal;
            previewTable.innerHTML += `
                <tr>
                    <td>${item.desc || '---'}</td>
                    <td class="text-center">${item.qty}</td>
                    <td class="text-right">${item.price.toLocaleString()}</td>
                    <td class="text-right" style="font-weight:700;">${rowTotal.toLocaleString()}</td>
                </tr>
            `;
        });

        const vatOn = document.getElementById('vatToggle').checked;
        const vat = vatOn ? subtotal * 0.075 : 0;
        const grandTotal = subtotal + vat;
        const curr = document.getElementById('currency').value;

        // GSAP Numbers
        gsap.to("#prevSubtotal", { duration: 0.4, innerText: subtotal.toFixed(2) });
        gsap.to("#prevVat", { duration: 0.4, innerText: vat.toFixed(2) });
        gsap.to("#prevTotal", { 
            duration: 0.5, 
            innerText: grandTotal.toFixed(2),
            scale: 1.05, 
            yoyo: true, 
            repeat: 1 
        });

        document.getElementById('prevBizName').innerText = document.getElementById('bizName').value || 'YOUR BUSINESS';
        document.getElementById('prevBizAddr').innerText = document.getElementById('bizAddress').value;
        document.getElementById('prevClientName').innerText = document.getElementById('clientName').value || 'Client Name';
        document.getElementById('prevBank').innerText = document.getElementById('bankInfo').value;
        
        document.querySelectorAll('.curr').forEach(el => el.innerText = curr);
    }

    // Logo Logic
    document.getElementById("logoUpload").addEventListener("change", function(e){
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.getElementById("logoPreview");
            img.src = reader.result;
            img.style.display = "block";
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function downloadPDF() {
        const element = document.getElementById('invoice-capture');
        const opt = {
            margin: 0,
            filename: 'NairaWise_Invoice.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    window.onload = init;
</script>

</body>
            </html>
