<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naira-Wise Pro+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
.container { max-width:1200px; margin:auto; padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:25px; }

.card { background:#fff; padding:20px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin-top:10px; border:1px solid #ccc; border-radius:6px; }

button { padding:10px; margin-top:10px; background:#4f46e5; color:#fff; border:none; border-radius:6px; cursor:pointer; }

.item-row { display:flex; gap:10px; margin-top:10px; }
.item-row input { flex:1; }

.invoice { background:#fff; padding:30px; position:relative; }
.logo { max-height:60px; }

.table { width:100%; margin-top:20px; border-collapse:collapse; }
.table th, .table td { border-bottom:1px solid #eee; padding:8px; }

.right { text-align:right; }

.footer { position:absolute; bottom:0; width:100%; left:0; text-align:center; font-size:10px; background:#111; color:#fff; padding:5px; }
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="card">

<h2>Naira-Wise Pro+</h2>

<input id="bizName" placeholder="Business Name">
<input id="clientName" placeholder="Client Name">
<textarea id="bizAddress" placeholder="Business Address"></textarea>

<input type="file" id="logoUpload">

<h3>Items</h3>
<div id="items"></div>
<button onclick="addItem()">+ Add Item</button>

<label><input type="checkbox" id="vatToggle"> Add VAT</label>

<input id="bankInfo" placeholder="Bank details">

<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="invoice" id="invoice">

<img id="logoPreview" class="logo">

<h2 id="prevBiz">Business</h2>
<p id="prevAddr"></p>

<p><strong>Invoice #:</strong> <span id="invoiceNo"></span></p>
<p><strong>Date:</strong> <span id="invoiceDate"></span></p>

<h3>Bill To: <span id="prevClient"></span></h3>

<table class="table">
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>
<tbody id="previewItems"></tbody>
</table>

<div class="right">
<p>VAT: ₦<span id="prevVat">0</span></p>
<h2>Total: ₦<span id="prevTotal">0</span></h2>
</div>

<p>Payment: <span id="prevBank"></span></p>

<div class="footer">Powered by Emmy STACK01</div>

</div>

</div>

<script>

let items = [];

function addItem() {
    const id = Date.now();

    items.push({ id, desc:"", qty:1, price:0 });

    renderItems();
}

function renderItems() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach(item => {
        container.innerHTML += `
        <div class="item-row">
            <input placeholder="Desc" oninput="updateItem(${item.id}, 'desc', this.value)">
            <input type="number" placeholder="Qty" oninput="updateItem(${item.id}, 'qty', this.value)">
            <input type="number" placeholder="Price" oninput="updateItem(${item.id}, 'price', this.value)">
        </div>
        `;
    });
}

function updateItem(id, key, value) {
    const item = items.find(i => i.id === id);
    item[key] = key === 'desc' ? value : parseFloat(value) || 0;
    update();
}

function update() {

    let total = 0;

    const preview = document.getElementById("previewItems");
    preview.innerHTML = "";

    items.forEach(i => {
        const t = i.qty * i.price;
        total += t;

        preview.innerHTML += `
        <tr>
            <td>${i.desc}</td>
            <td>${i.qty}</td>
            <td>${i.price}</td>
            <td>${t}</td>
        </tr>
        `;
    });

    const vatOn = document.getElementById("vatToggle").checked;
    const vat = vatOn ? total * 0.075 : 0;
    const grand = total + vat;

    gsap.to("#prevVat", { duration:0.3, innerText: vat });
    gsap.to("#prevTotal", { duration:0.4, innerText: grand });

    document.getElementById("prevBiz").innerText = document.getElementById("bizName").value;
    document.getElementById("prevClient").innerText = document.getElementById("clientName").value;
    document.getElementById("prevAddr").innerText = document.getElementById("bizAddress").value;
    document.getElementById("prevBank").innerText = document.getElementById("bankInfo").value;

    saveData();
}

function downloadPDF() {
    html2pdf().from(document.getElementById("invoice")).save();
}

// logo preview
document.getElementById("logoUpload").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = () => {
        document.getElementById("logoPreview").src = reader.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

// invoice meta
document.getElementById("invoiceNo").innerText = Math.floor(Math.random()*100000);
document.getElementById("invoiceDate").innerText = new Date().toLocaleDateString();

// save/load
function saveData() {
    localStorage.setItem("invoiceData", JSON.stringify({
        items,
        biz: bizName.value,
        client: clientName.value
    }));
}

function loadData() {
    const data = JSON.parse(localStorage.getItem("invoiceData"));
    if(!data) return;

    items = data.items || [];
    bizName.value = data.biz;
    clientName.value = data.client;

    renderItems();
    update();
}

loadData();
addItem();

</script>

</body>
</html>
