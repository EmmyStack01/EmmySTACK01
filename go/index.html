<!DOCTYPE html>
<html>
<head>
    <title>Redirecting | Emmy STACK01</title>
    <style>
        body { background: #000; color: #00ccff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 3px solid #111; border-top: 3px solid #00ccff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // Catch the partner ID from the URL (e.g., ?id=WI204EZ)
        const urlParams = new URLSearchParams(window.location.search);
        const partnerId = urlParams.get('id');
        
        // Your Master Apps Script URL
        const apiURL = "https://script.google.com/macros/s/AKfycbxGNMSMg8MaN7LNtSeO9_k5PATZuGRWRlGUD0uBI-kOFIx7YlMz-3OARvjnoP1sFBjU/exec";

        if (partnerId) {
            // Forward to Apps Script for the Hit Counter + WhatsApp Redirect
            window.location.href = `${apiURL}?partner=${partnerId}`;
        } else {
            // Fallback if no ID is provided
            window.location.href = "https://emmystack01.com";
        }
    </script>
</body>
</html>
