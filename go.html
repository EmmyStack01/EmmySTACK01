<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting | Emmy STACK01</title>
    <style>
        body { background: #000; color: #00ccff; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 2px solid rgba(0,204,255,0.1); border-top: 2px solid #00ccff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const partnerId = urlParams.get('id');
        const apiURL = "YOUR_APPS_SCRIPT_URL"; // The one with the doGet redirect logic

        if (partnerId) {
            // This calls your Master Apps Script to get the WhatsApp link
            window.location.href = `${apiURL}?partner=${partnerId}`;
        } else {
            window.location.href = "https://emmystack01.com";
        }
    </script>
</body>
</html>
