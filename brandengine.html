<script>
/**
 * EMMY STACK01 - BRAND ENGINE CORE
 * Professional Brand Blueprint Generator
 */
const { jsPDF } = window.jspdf;

// --- 1. CONFIGURATION & STATE ---
const brandState = {
    name: '',
    niche: '',
    colors: [],
    fonts: { header: 'Orbitron', body: 'Montserrat' },
    slogan: '',
    isScanning: false
};

// --- 2. DYNAMIC ASSET LOADING ---
const loadAIFonts = (fonts) => {
    if (!fonts || !fonts.header || !fonts.body) return;
    
    // 1. Create/Update the Google Fonts link in the <head>
    const linkId = 'dynamic-fonts';
    let link = document.getElementById(linkId);
    if (!link) {
        link = document.createElement('link');
        link.id = linkId;
        link.rel = 'stylesheet';
        document.head.appendChild(link);
    }
    
    // Format font names for Google Fonts API (replace spaces with +)
    const headerFont = fonts.header.replace(/\s+/g, '+');
    const bodyFont = fonts.body.replace(/\s+/g, '+');
    
    // Fetch both fonts from Google
    link.href = `https://fonts.googleapis.com/css2?family=${headerFont}:wght@400;700&family=${bodyFont}:wght@400;700&display=swap`;

    // 2. Apply font families to the UI Preview elements
    const headerPreview = document.getElementById('headerPreview');
    const bodyPreview = document.getElementById('bodyPreview');
    const headerNameDisplay = document.getElementById('headerFontName');
    const bodyNameDisplay = document.getElementById('bodyFontName');

    if (headerPreview) headerPreview.style.fontFamily = `'${fonts.header}', sans-serif`;
    if (bodyPreview) bodyPreview.style.fontFamily = `'${fonts.body}', sans-serif`;
    
    // 3. Update the text labels in the Typography DNA card
    if (headerNameDisplay) headerNameDisplay.innerText = `HEADER: ${fonts.header.toUpperCase()}`;
    if (bodyNameDisplay) bodyNameDisplay.innerText = `BODY: ${fonts.body.toUpperCase()}`;

    // 4. Also update the global name-card style for consistency
    const styleId = 'dynamic-font-styles';
    let styleTag = document.getElementById(styleId);
    if (!styleTag) {
        styleTag = document.createElement('style');
        styleTag.id = styleId;
        document.head.appendChild(styleTag);
    }
    styleTag.innerHTML = `.name-card span { font-family: '${fonts.header}', sans-serif; }`;
};

// --- 3. ACCESSIBILITY & UTILS ---
const getLuminance = (hex) => {
    const rgb = hex.match(/\w\w/g).map(x => {
        const s = parseInt(x, 16) / 255;
        return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
};

const auditContrast = (hex) => {
    const l1 = getLuminance(hex);
    const l2 = getLuminance("#050505"); 
    const ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
    return { ratio: ratio.toFixed(2), isPass: ratio >= 4.5 };
};

const showToast = (message) => {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    const tl = gsap.timeline();
    tl.to(toast, { opacity: 1, y: 0, duration: 0.5, ease: "power4.out" })
      .to(toast, { opacity: 0, y: 20, duration: 0.5, delay: 2, ease: "power4.in" });
};

// --- 4. CORE ENGINE LOGIC ---
const initializeBrandFlow = async () => {
    const keywordInput = document.getElementById('brandKeyword').value.trim();
    const nicheInput = document.getElementById('brandNiche').value.trim();

    if (!keywordInput) {
        alert("Enter a keyword to begin the DNA scan.");
        return;
    }

    updateButtonStatus(true);

    try {
        const response = await fetch('https://emmy-stack-01.vercel.app/api/generate', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json' 
            },
            body: JSON.stringify({ 
                keyword: keywordInput, 
                niche: nicheInput 
            })
        });

        // If the backend returns our custom error, we handle it here
        const aiData = await response.json();

        if (!response.ok) {
            throw new Error(aiData.details || 'Sync Failed');
        }

        // Current aadded: initializeBrandFlow try block after success:
        const scanBtn = document.getElementById('generateBtn');
        scanBtn.disabled = true;
        let secondsLeft = 60;

        const cooldownTimer = setInterval(() => {
            secondsLeft--;
            scanBtn.innerText = `SYSTEM RECHARGING: ${secondsLeft}s`;
            if (secondsLeft <= 0) {
                clearInterval(cooldownTimer);
                scanBtn.disabled = false;
                scanBtn.innerText = "INITIALIZE DNA SCAN";
            }
        }, 1000);

        // --- UPDATE STATE WITH REAL AI DATA ---
        // Instead of just using the keyword, let's use the first AI suggestion as the "Primary Name"
        brandState.name = aiData.names[0] || keywordInput; 
        brandState.niche = nicheInput;
        brandState.colors = aiData.colors;
        brandState.fonts = aiData.fonts;
        brandState.slogan = aiData.slogan || "";

        // --- UI UPDATES ---
        document.getElementById('brandSlogan').innerText = brandState.slogan;
        
        // Pass the names array to your render function
        renderNames(aiData.names);
        renderPalette(aiData.colors);
        loadAIFonts(aiData.fonts);
        animateQRReveal();

        document.getElementById('downloadPdf').disabled = false;
        showToast("BIOMETRIC SCAN COMPLETE");
        
    } catch (error) {
        console.error("AI Error:", error);
        // This will now show the SPECIFIC error message from your Vercel logs
        alert(`DNA Sync Error: ${error.message}`);
    } finally {
        updateButtonStatus(false);
    }
};


const renderNames = (names) => {
    const container = document.getElementById('nameResults');
    if (!container) return;
    
    container.innerHTML = '';
    names.forEach((name, i) => {
        const el = document.createElement('div');
        el.className = 'name-card';
        // Style it like a button
        el.style.padding = "15px";
        el.style.marginBottom = "10px";
        el.style.background = name === brandState.name ? "rgba(0, 204, 255, 0.2)" : "rgba(255,255,255,0.03)";
        el.style.borderLeft = `2px solid var(--accent)`;
        el.style.cursor = "pointer";
        el.style.transition = "0.3s";
        
        el.innerHTML = `
            <span style="display:block; font-size:1.1rem; color:white;">${name}</span>
            <small style="color:var(--accent); font-family:'JetBrains Mono'; font-size:0.7rem;">
                ${name === brandState.name ? "DNA SELECTED" : "CLICK TO SELECT"}
            </small>
        `;

        el.onclick = () => {
            brandState.name = name; // Lock in the choice
            renderNames(names);     // Re-render to show selection
            animateQRReveal();      // Refresh QR for the new name
            showToast(`IDENTITY UPDATED: ${name}`);
        };

        container.appendChild(el);
        gsap.from(el, { opacity: 0, x: -20, duration: 0.5, delay: i * 0.1 });
    });
};

const renderPalette = (colors) => {
    const container = document.getElementById('paletteDisplay');
    if (!container) return;
    container.innerHTML = '';

    colors.forEach((color, i) => {
        const audit = auditContrast(color);
        const swatch = document.createElement('div');
        swatch.className = 'swatch-container';
        swatch.style.cursor = 'pointer';
        swatch.onclick = () => {
            navigator.clipboard.writeText(color.toUpperCase());
            showToast(`HEX COPIED: ${color.toUpperCase()}`);
        };
        
        swatch.innerHTML = `
            <div class="swatch" style="background:${color}; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 10px ${color}44"></div>
            <div class="swatch-info">
                <code style="font-size:0.8rem;">${color.toUpperCase()}</code>
                <span class="badge ${audit.isPass ? 'pass' : 'fail'}" style="display:block; width:fit-content; margin-top:4px;">
                    ${audit.isPass ? 'PASS' : 'LOW CONTRAST'} ${audit.ratio}:1
                </span>
            </div>
        `;
        container.appendChild(swatch);
        gsap.from(swatch, { scale: 0.8, opacity: 0, delay: i * 0.1 });
    });
};

const animateQRReveal = () => {
    const wrapper = document.getElementById('qrWrapper');
    const colorHex = brandState.colors[0] ? brandState.colors[0].replace('#', '') : '00ccff';
    
    const previewURL = `https://emmystack01.com/preview?name=${encodeURIComponent(brandState.name)}&color=${colorHex}&font=${encodeURIComponent(brandState.fonts.header)}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(previewURL)}&color=00ccff&bgcolor=050505`;

    wrapper.innerHTML = `<img src="${qrUrl}" alt="Brand QR" style="border: 2px solid var(--accent); padding: 5px; border-radius: 10px; background: #050505;">`;

    gsap.fromTo(wrapper, 
        { scale: 0.5, opacity: 0, rotation: -15 },
        { scale: 1, opacity: 1, rotation: 0, duration: 1, ease: "back.out(1.7)" }
    );
};

// --- 5. EVENTS & INITIALIZATION ---
document.getElementById('generateBtn').addEventListener('click', initializeBrandFlow);

document.getElementById('downloadPdf').addEventListener('click', () => {
    const doc = new jsPDF();
    const accent = "#00ccff";

    // Dark Mode Background
    doc.setFillColor(5, 5, 5);
    doc.rect(0, 0, 210, 297, 'F');

    // Header: Selected Brand Name
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(28);
    doc.text(brandState.name.toUpperCase(), 20, 40);
    
    // Slogan
    doc.setFontSize(12);
    doc.setTextColor(accent);
    doc.text(brandState.slogan.toUpperCase(), 20, 50);

    // Section: Color DNA
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(16);
    doc.text("VISUAL DNA PALETTE", 20, 80);

    brandState.colors.forEach((color, i) => {
        const y = 95 + (i * 20);
        doc.setFillColor(color);
        doc.roundedRect(20, y, 40, 15, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(10);
        doc.text(color.toUpperCase(), 70, y + 10);
    });

    // Section: Typography DNA
    doc.setFontSize(16);
    doc.text("TYPOGRAPHY BLUEPRINT", 20, 200);
    
    doc.setFontSize(12);
    doc.setTextColor(accent);
    doc.text("PRIMARY HEADER:", 20, 215);
    doc.setTextColor(255, 255, 255);
    doc.text(brandState.fonts.header, 70, 215);

    doc.setTextColor(accent);
    doc.text("BODY TEXT:", 20, 225);
    doc.setTextColor(255, 255, 255);
    doc.text(brandState.fonts.body, 70, 225);

    // Footer
    doc.setFontSize(8);
    doc.setTextColor(100, 100, 100);
    doc.text("GENERATED BY EMMY STACK01 BRAND ENGINE", 105, 285, { align: "center" });

    doc.save(`Emmy-DNA-${brandState.name}.pdf`);
});

function updateButtonStatus(loading) {
    const btn = document.getElementById('generateBtn');
    btn.innerText = loading ? "SCANNING BIOMETRICS..." : "INITIALIZE DNA SCAN";
    btn.style.opacity = loading ? "0.6" : "1";
    btn.style.pointerEvents = loading ? "none" : "auto";
}

window.onload = () => {
    gsap.set(".engine-container", { visibility: "visible" });
    const tl = gsap.timeline();
    tl.from(".control-panel", { x: -50, opacity: 0, duration: 1, ease: "power4.out" })
      .from(".bento-card:not(.control-panel)", { scale: 0.95, opacity: 0, duration: 0.8, stagger: 0.1, ease: "back.out(1.2)" }, "-=0.6");
};
</script>
