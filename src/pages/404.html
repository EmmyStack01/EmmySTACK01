<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/script/meta-logic.js" is:inline></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired or Invalid | Emmy STACK01</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="apple-touch-icon" sizes="180x180" href="https://emmystack01.com/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://emmystack01.com/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://emmystack01.com/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="https://emmystack01.com/favicon_io/site.webmanifest">
    <style>
        body {
            background-color: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .system-error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #000000;
        color: #ffffff;
        font-family: sans-serif; /* Use your platform's main geometric font */
        padding: 24px;
        text-align: center;
        }

        .brand-logo img {
        max-width: 140px;
        }

        .error-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
        }

        .error-subtitle {
        font-size: 0.95rem;
        color: #a0a0a0;
        max-width: 320px;
        line-height: 1.5;
        margin-bottom: 36px;
        }

        .status-box {
        width: 100%;
        max-width: 340px;
        margin-bottom: 30px;
        }

        .status-heading {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 16px;
        }

        /* Progress Bar Tracking the Redirect Layout */
        .progress-bar-container {
        width: 100%;
        height: 4px;
        background-color: #1a1a1a;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 12px;
        }

        .progress-bar-fill {
        height: 100%;
        width: 100%;
        background-color: #00bfff; /* Your core accent cyan/blue */
        animation: countdownProgress 10s linear forwards;
        }

        .status-subtext {
        font-size: 0.85rem;
        color: #666666;
        }

        /* Fallback Button matching the layout theme */
        .btn-fallback {
        display: inline-block;
        background: linear-gradient(90deg, #1e40af, #00bfff);
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        padding: 12px 32px;
        border-radius: 4px;
        text-transform: uppercase;
        margin-bottom: 40px;
        }

        /* CSS Animation for the Bar */
        @keyframes countdownProgress {
        from { width: 100%; }
        to { width: 0%; }
        }
    </style>
</head>
<body>
    <div class="system-error-container">
        <!-- Brand Header -->
        <div class="brand-logo">
            <img src="https://emmystack01.com/asset/emmy-stack01-logo.png" alt="Emmy STACK01" />
        </div>

        <!-- Error Messaging -->
        <h1 class="error-title">System Error 404</h1>
        <p class="error-subtitle">The link may be mistyped or the resource is no longer active.</p>

        <!-- Dynamic Status Box -->
        <div class="status-box">
            <h3 class="status-heading">Initiating Auto-Reboot...</h3>
            
            <!-- The Redirect-style Progress Bar -->
            <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
            </div>
            
            <p class="status-subtext">Returning you to the core homepage in <span id="countdown">10</span>s</p>
        </div>

        <!-- Manual Override Button -->
        <a href="/" class="btn-fallback">Return to Home</a>
    </div>
    
    <script>
        // Optional: Auto-redirect home after 10 seconds
        setTimeout(() => {
            window.location.href = "https://emmystack01.com";
        }, 10000);
    </script>
</body>
</html>
