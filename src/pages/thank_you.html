<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/script/meta-logic.js" is:inline></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Emmy STACK01</title>
    <meta name="robots" content="noindex, nofollow"> 
</head>
<body>
    <div class="redirect-container">
        <div class="logo"><img src="/asset/emmy-stack01-logo.png" alt="Emmy STACK01 logo" height="50px" width="125px"></div>
        <h1>Redirecting to WhatsApp...</h1>
        <p>Thank you for choosing Emmy STACK01. Your chat will open in a moment.</p>

        <div class="status-box">
            <h2 id="status-text">Initializing Secure Chat...</h2>
            <div class="loader-bar">
                <div class="progress"></div>
            </div>
            <p class="subtext">Connecting you to our WhatsApp business portal.</p>
        </div>
        
        <div class="trust-preview">
            <p>While you wait, see why clients trust us:</p>
            <div class="stars">★★★★★</div>
            <a href="https://www.trustpilot.com/review/emmystack01.com" target="_blank">View Trustpilot Profile</a>
        </div>
    </div>

    <style>
        body {
            background-color: #0a0a0a; /* Deep Black */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .redirect-container { text-align: center; max-width: 400px; padding: 20px; }
        .loader-bar { width: 100%; height: 4px; background: #222; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress { width: 0%; height: 100%; background: #2d66b4; animation: load 2.5s forwards; }
        @keyframes load { to { width: 100%; } }
        .subtext { font-size: 0.8rem; color: #888; }
        .trust-preview { margin-top: 50px; border-top: 1px solid #222; padding-top: 20px; }
        .stars { color: #ffb400; font-size: 1.2rem; margin-bottom: 5px; }
        a { color: #00ff88; text-decoration: none; font-size: 0.9rem; }
    </style>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            
            const subtext = document.querySelector('.subtext'); 
            let finalLink = "https://wa.me/2349076991076";
        
            if (type === 'license') {
                // Professional Brand License / White-Labeling Request
                finalLink = "https://wa.me/2349076991076?text=Hello%20Emmy%20STACK01!%20I%E2%80%99m%20interested%20in%20securing%20the%20Professional%20Brand%20License%20for%20my%20project.%20I%E2%80%99d%20like%20to%20discuss%20the%20transition%20to%20full%20code%20ownership%20and%20removing%20the%20developer%20attribution.";
            } else if (type === 'hub' || type === 'maintenance') {
                // Management Hub / Long-term Growth Plan Request
                finalLink = "https://wa.me/2349076991076?text=Hello%20Emmy%20STACK01!%20I%E2%80%99ve%20just%20reviewed%20the%20Management%20Hub.%20I%E2%80%99d%20like%20to%20discuss%20the%20best%20long-term%20plan%20for%20my%20project's%20growth%20and%20maintenance.";
            } else if (type === 'inquiry') {
                // General Pre-sales Inquiry
                finalLink = "https://wa.me/2349076991076?text=Hi%20Emmy%20STACK01%2C%20I%20have%20a%20few%20questions%20about%20your%20services%20before%20getting%20started.";
            }
        
            // Updates status halfway through the animation
            setTimeout(() => {
                if(subtext) subtext.innerText = "Security Handshake Complete...";
            }, 1200);
        
            // Triggers redirect immediately when the 2.5s progress bar animation ends
            setTimeout(() => {
                if(subtext) subtext.innerText = "Opening WhatsApp...";
                window.location.href = finalLink;
            }, 2500); 
        });
    </script>
</body>
</html>
