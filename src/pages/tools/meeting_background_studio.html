    <style>

            --panel: #161b22;

            --border: rgba(255,255,255,0.1);

            --emmy-green-light: #34d399;

        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans'; }
        body { background: var(--bg); color: white; overflow: hidden; }    
    
        .back-btn {
        position: absolute;
        top: 24px;
        left: 24px;
        z-index: 3;

        display: flex;
        align-items: center;
        justify-content: center;

        .back-btn2{
        top: 24px;
        left: 24px;
        z-index: 3;

        display: flex;
        align-items: center;
        justify-content: center;

        width: 42px;
        height: 42px;

        border-radius: 50%;
        text-decoration: none;

        /* Glass effect */
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        color: #f9fafb;

        /* Optional glow on hover (matches your green brand) */

        }

        }

        left: 50px;
        white-space: nowrap;

        transform: translateX(-10px);

        }
        .back-btn2::after {

        /* HERO SECTION */

        }

        /* DARK OVERLAY (depth + readability) */
        .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            90deg,
            rgba(13, 17, 23, 0.85) 0%,
            rgba(13, 17, 23, 0.65) 45%,
            rgba(13, 17, 23, 0.3) 100%
        );
        z-index: 1;
        }

        /* CONTENT */
        .hero-content {
        position: relative;
        z-index: 2;
        max-width: 600px;
        color: var(--text-primary);
        }

        /* LIVE BADGE */

        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--primary);
        margin-bottom: 20px;
        font-weight: 500;
        }

        .live-badge::before {
        content: "";
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
        }

        /* HEADLINE */
        .hero h1 {
        font-size: clamp(2.5rem, 5vw, 3.8rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -1px;

        gap: 16px;

        padding: 14px 26px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);

        .btn-primary:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 15px 40px rgba(16, 185, 129, 0.5);
        }


        /* LIVE DOT ANIMATION */
        @keyframes pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }
        70% {
            box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
        }

        /* SUBTLE BACKGROUND MOTION */
        .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: inherit;
        animation: slowZoom 20s ease-in-out infinite alternate;
        z-index: 0;
        }

        @keyframes slowZoom {
        from {
            transform: scale(1);
        }
        to {
            transform: scale(1.05);
        }
        }

        .hero {
            padding: 0 20px;
            align-items: center;
            padding-bottom: 60px;

        /* --- LAYOUT --- */
        .studio { transition: opacity 0.8s ease; display: flex; height: 100vh; flex-direction: row; overflow: hidden; /* Prevent body scroll */ }

        /* --- SIDEBAR (Responsive) --- */

            width: 320px; background: var(--panel); padding: 24px; 
            border-right: 1px solid var(--border); z-index: 100;

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .bg-thumb {
            aspect-ratio: 16 / 9;
            border-radius: 6px;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.7;
        }

        .bg-thumb:hover {
            opacity: 1;
            border-color: var(--muted);
        }

        .bg-thumb.active {
            opacity: 1;
            border-color: var(--primary);
        }

        button.active { background: var(--primary); border-color: var(--primary); }

            display: flex;

            border: 1px solid #333;

            .sidebar { width: 100%; height: 40vh; border-right: none; border-top: 1px solid var(--border); }
            .preview-container { height: 60vh; }

            .sidebar::-webkit-scrollbar {
                width: 8px;
            }

            .sidebar::-webkit-scrollbar-track {
                background: var(--border);
            }

            .sidebar::-webkit-scrollbar-thumb {
                background: var(--border);

            }

            .sidebar::-webkit-scrollbar-thumb:hover {
                background: var(--primary);
            }
        }
        h2{
            margin-top: 10px;
            font-size: 1.5em;
            width: 200px;
            line-height: 0.9;
            font-family: 'Plus Jakarta Sans';
            font-weight: 700;
            letter-spacing: -1px;
        }
        h2 span{
            font-size: 0.7em;
            font-weight: 500;
            color: var(--primary);
            letter-spacing: 0px;
            word-spacing: 1px;
        }
        #canvas-wrapper {
            width: 100%;
            max-width: 1200px; /* Or 1920px if you want it full-width on giant monitors */
            margin: 0 auto;
            position: relative;
            
            /* 1. Force the 16:9 shape even if empty */
            aspect-ratio: 16 / 9; 
            
            /* 2. Standardize appearance */
            background: #1a1a1a; 
            overflow: hidden; /* Keeps "off-canvas" objects from causing side-scrolling */
            
            /* 3. Ensure it's a block for script calculations */
            display: block; 
        }

        #main-canvas {
            /* Let the Fabric.js script control the dimensions, 
            but ensure it never overflows the phone screen */
            max-width: 100%;
            height: auto !important;
        }
        #qr-buffer {
            position: absolute;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
            /* DO NOT use display: none; */
        }
    </style>
</head>

    <script>
        /**
         * EMMY STACK01 STUDIO - Core Script
         * Organized by: Initialization > UI Navigation > Canvas Engine > Exports
         * Fixed: Canvas coordinate recalibration for hidden-to-visible transition
         */

        // 1. GLOBAL STATE & INITIALIZATION
        const canvas = new fabric.Canvas('main-canvas', {
            width: 1920,
            height: 1080,
            selection: true
        });

        let qrGroupRef = null; 

        // UI Elements
        const videoEl = document.getElementById('bg-video');
        const imageEl = document.getElementById('bg-image');
        const bgPresets = document.querySelectorAll('.bg-thumb');
        const bgUpload = document.getElementById('bg-upload');


        // 2. UI NAVIGATION (Hero <-> Studio)
        function launchStudio() {
            const hero = document.getElementById('hero-interface');
            const studio = document.getElementById('main-studio');

            // Fade and slide hero out
            hero.style.transition = "opacity 0.5s ease, transform 0.5s ease";
            hero.style.opacity = '0';
            hero.style.transform = 'translateY(-30px)';

            setTimeout(() => {
                hero.style.display = 'none';
                
                // Show studio
                studio.style.display = 'flex';
                studio.style.opacity = '0';
                studio.style.transform = 'translateY(20px)';
                
                // Force reflow
                studio.offsetHeight; 

                studio.style.transition = "opacity 0.8s ease, transform 0.8s ease";
                studio.style.opacity = '1';
                studio.style.transform = 'translateY(0)';
                
                // --- CRITICAL FIX ---
                // Fabric.js needs to re-run its internal offsets now that display is no longer 'none'
                canvas.calcOffset(); 
                resizeCanvas(); 
            }, 500);
        }

        function showHero(e) {
            if (e) e.preventDefault();
            const hero = document.getElementById('hero-interface');
            const studio = document.getElementById('main-studio');

            studio.style.opacity = '0';
            studio.style.transform = 'translateY(20px)';

            setTimeout(() => {
                studio.style.display = 'none';
                hero.style.display = 'flex';
                hero.offsetHeight;
                hero.style.opacity = '1';
                hero.style.transform = 'translateY(0)';
            }, 500);
        }

        // 3. RESPONSIVE SYSTEM
        const BASE_WIDTH = 1920;
        const BASE_HEIGHT = 1080;
                
        function resizeCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            if (!wrapper || wrapper.clientWidth === 0) return;

            const scale = wrapper.clientWidth / BASE_WIDTH;

            // Force the height to be exactly proportional to the 16:9 ratio
            const calculatedHeight = wrapper.clientWidth * (BASE_HEIGHT / BASE_WIDTH);

            canvas.setDimensions({ 
                width: wrapper.clientWidth, 
                height: calculatedHeight 
            });

            canvas.setZoom(scale);
            canvas.calcOffset();
            repositionObjects();
        }
        
        function repositionObjects() {
            const margin = BASE_WIDTH * 0.04;
            
            canvas.getObjects().forEach(obj => {
                // LOGO LOGIC
                if (obj.type === 'image' && obj !== qrGroupRef) {
                    obj.set({ 
                        left: margin, 
                        top: margin,
                        originX: 'left',
                        originY: 'top'
                    });
                }

                // QR GROUP LOGIC
                if (obj === qrGroupRef) {
                    obj.set({ 
                        left: BASE_WIDTH - margin, // 1844px
                        top: margin,
                        originX: 'right', // Critical: Anchor to the right edge
                        originY: 'top'
                    });
                    obj.bringToFront(); 
                }
                
                // Update hit-box for mobile touch events
                obj.setCoords();
            });
            
            canvas.renderAll();
        }


        // 4. CUSTOM DELETE CONTROL
        const deleteIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff4d4d' width='24px' height='24px'%3E%3Cpath d='M14.59 8L12 10.59 9.41 8 8 9.41 10.59 12 8 14.59 9.41 16 12 13.41 14.59 16 16 14.59 13.41 12 16 9.41 14.59 8zM12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z'/%3E%3C/svg%3E";
        const deleteImg = document.createElement('img');
        deleteImg.src = deleteIcon;

        function renderDeleteControl(ctx, left, top, styleOverride, fabricObject) {
            const size = 24;
            ctx.save();
            ctx.translate(left, top);
            ctx.rotate(fabric.util.degreesToRadians(fabricObject.angle));
            ctx.drawImage(deleteImg, -size/2, -size/2, size, size);
            ctx.restore();
        }

        function deleteObject(eventData, transform) {
            const target = transform.target;
            if (target === qrGroupRef) {
                document.getElementById('card-url').value = "";
                qrGroupRef = null;
            }
            canvas.remove(target);
            canvas.requestRenderAll();
        }

        fabric.Object.prototype.transparentCorners = false;
        fabric.Object.prototype.cornerColor = '#10b981';
        fabric.Object.prototype.cornerStyle = 'circle';
        fabric.Object.prototype.cornerSize = 12;

        fabric.Object.prototype.controls.deleteControl = new fabric.Control({
            x: 0.5, y: -0.5, offsetY: -16, offsetX: 16,
            cursorStyle: 'pointer', mouseUpHandler: deleteObject,
            render: renderDeleteControl, cornerSize: 24
        });


        // 5. MOCKUP & BACKGROUND ENGINE
        function setMockup(type) {
            document.querySelectorAll('.mockup-ui').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.btn-row button').forEach(el => el.classList.remove('active'));
            if(type !== 'none') document.getElementById(`mockup-${type}`).style.display = 'block';
            document.getElementById(`btn-${type}`).classList.add('active');
        }

        function updateBackground(src, isVideo = false) {
            if (isVideo) {
                imageEl.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.src = src;
                videoEl.play().catch(e => console.log("Video Playback Logged"));
            } else {
                videoEl.pause();
                videoEl.style.display = 'none';
                imageEl.style.display = 'block';
                imageEl.src = src;
            }
        }

        bgPresets.forEach(thumb => {
            thumb.addEventListener('click', function() {
                bgPresets.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const isVideo = this.dataset.type === 'video' || this.getAttribute('data-type') === 'video';
                const src = this.dataset.src || this.getAttribute('data-src');
                updateBackground(src, isVideo);
            });
        });

        bgUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                updateBackground(URL.createObjectURL(file), file.type.startsWith('video/'));
                bgPresets.forEach(b => b.classList.remove('active'));
            }
        });


        // 6. ASSET UPLOADS (Logo & QR) - MOBILE CENTERED FIX
        document.getElementById('logo-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    // 1. Scale relative to the 1920 design
                    img.scaleToWidth(300); 
                    
                    const margin = BASE_WIDTH * 0.04; // ~76px
                    
                    // 2. Set coordinates based on the FULL 1920 width
                    img.set({
                        left: margin,
                        top: margin,
                        originX: 'left',
                        originY: 'top'
                    });

                    canvas.add(img);
                    
                    // 3. CRITICAL: Re-run resize to snap everything into view
                    resizeCanvas();
                    
                    canvas.setActiveObject(img);
                    if(qrGroupRef) qrGroupRef.bringToFront();
                });
            };
            reader.readAsDataURL(file);
            e.target.value = ""; 
        });

        // Function to handle QR Generation
        function handleQRGeneration() {
            let inputUrl = document.getElementById('card-url').value.trim();
            if (!inputUrl) {
                if (qrGroupRef) { canvas.remove(qrGroupRef); qrGroupRef = null; }
                return canvas.requestRenderAll();
            }
        
            let finalUrl = /^https?:\/\//i.test(inputUrl) ? inputUrl : 'https://' + inputUrl;
            const buffer = document.getElementById('qr-buffer');
            buffer.innerHTML = "";
            
            // Force the library to use 'canvas' mode instead of 'img'
            new QRCode(buffer, { 
                text: finalUrl, 
                width: 512, 
                height: 512, 
                useSVG: false // This forces canvas mode
            });
        
            setTimeout(() => {
                // Find the canvas the library just created
                const qrCanvas = buffer.querySelector('canvas');
                if (!qrCanvas) return;
        
                // Convert that canvas directly to a DataURL
                const qrDataUrl = qrCanvas.toDataURL("image/png");
        
                fabric.Image.fromURL(qrDataUrl, (qrImg) => {
                    if (qrGroupRef) canvas.remove(qrGroupRef);
        
                    const whitePlate = new fabric.Rect({
                        width: 340, height: 340, fill: '#fff', rx: 20, ry: 20,
                        shadow: '0 10px 25px rgba(0,0,0,0.3)'
                    });
        
                    qrImg.scaleToWidth(300);
                    qrImg.set({ left: 20, top: 20 });
        
                    const margin = BASE_WIDTH * 0.04;
                    
                    qrGroupRef = new fabric.Group([whitePlate, qrImg], {
                        left: BASE_WIDTH - margin,
                        top: margin,
                        originX: 'right',
                        originY: 'top',
                        objectCaching: false
                    });
        
                    canvas.add(qrGroupRef);
                    
                    resizeCanvas();
                    qrGroupRef.setCoords();
                    qrGroupRef.bringToFront();
                    canvas.requestRenderAll();
                });
            }, 300);
        }

        // Attach to Button Click
        document.getElementById('generate-qr-btn').addEventListener('click', handleQRGeneration);

        // Optional: Also trigger on 'Enter' key inside the input
        document.getElementById('card-url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleQRGeneration();
        });


        // 7. EXPORT SYSTEM
        document.getElementById('export-btn').addEventListener('click', () => {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = 1920; 
            exportCanvas.height = 1080;
            const ctx = exportCanvas.getContext('2d');
            const activeBg = (videoEl.style.display === 'block') ? videoEl : imageEl;

            try {
                // --- STEP 1: CENTER CROP THE BACKGROUND ---
                // This ensures the export matches the "Cover" look of your studio
                const imgWidth = activeBg.videoWidth || activeBg.naturalWidth;
                const imgHeight = activeBg.videoHeight || activeBg.naturalHeight;
                
                const canvasRatio = 1920 / 1080;
                const imgRatio = imgWidth / imgHeight;
                
                let sX, sY, sW, sH;

                if (imgRatio > canvasRatio) {
                    // Image is wider than canvas
                    sH = imgHeight;
                    sW = imgHeight * canvasRatio;
                    sX = (imgWidth - sW) / 2;
                    sY = 0;
                } else {
                    // Image is taller than canvas
                    sW = imgWidth;
                    sH = imgWidth / canvasRatio;
                    sX = 0;
                    sY = (imgHeight - sH) / 2;
                }

                ctx.drawImage(activeBg, sX, sY, sW, sH, 0, 0, 1920, 1080);
                
                // --- STEP 2: CAPTURE FABRIC OVERLAY ---
                const currentScale = canvas.getZoom();
                canvas.setZoom(1); 
                canvas.setDimensions({ width: 1920, height: 1080 });

                const fabricData = canvas.toDataURL({ 
                    format: 'png',
                    quality: 1.0
                });

                // Instant reset for the UI
                canvas.setZoom(currentScale);
                resizeCanvas(); 

                // --- STEP 3: COMBINE ---
                const tempImg = new Image();
                tempImg.crossOrigin = "anonymous";
                tempImg.onload = () => {
                    ctx.drawImage(tempImg, 0, 0);
                    const link = document.createElement('a');
                    link.download = `EmmySTACK01_Studio_Background_${Date.now()}.jpg`;
                    link.href = exportCanvas.toDataURL('image/jpeg', 0.95);
                    link.click();

                    // Clean up memory
                    URL.revokeObjectURL(link.href);
                };
                tempImg.src = fabricData;

            } catch (err) {
                console.error("Export failed. This is usually a CORS issue with the background image.", err);
                alert("Could not export. Please try using a different background or an uploaded image.");
            }
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Initialize on load
    </script>
</body>
</html>
